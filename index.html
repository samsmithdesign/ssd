  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg:  #0e0e0e;
    --fg:  #f0efeb;
    --mid: #666;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'MessinaSans', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    cursor: crosshair;
    user-select: none;
  }

  /* ── DOT CANVAS ── */
  #dot-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ── MAIN STAGE ── */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  /* ── LOGOTYPE ── */
  .logo {
    font-family: 'MessinaSans', Helvetica, Arial, sans-serif;
    font-size: clamp(5.5rem, 19vw, 15rem);
    letter-spacing: -0.04em;
    line-height: 0.88;
    color: var(--fg);
    text-align: center;
    margin-bottom: clamp(1.4rem, 3.2vw, 2.4rem);

  }

  /* ── SUBTITLE ── */
  .subtitle-wrap {
    height: clamp(1.3rem, 2.4vw, 1.7rem);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-width: 36ch;
  }

  /* Magic 8-ball: two spans cross-fading */
  .subtitle {
    font-family: 'MessinaSans', Helvetica, Arial, sans-serif;
    font-size: clamp(0.78rem, 1.35vw, 1.05rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg);
    position: absolute;
    white-space: nowrap;
    text-align: center;
    opacity: 0;
    filter: blur(6px);
    transition:
      opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1),
      filter  0.9s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .subtitle.visible {
    opacity: 1;
    filter: blur(0px);
  }

  .subtitle.hidden {
    opacity: 0;
    filter: blur(8px);
  }

  /* Click prompt */
  .click-prompt {
    position: fixed;
    bottom: clamp(4rem, 8vw, 6rem);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
    z-index: 10;
  }
  .click-prompt.visible { opacity: 1; }
  .click-prompt.hidden  { opacity: 0; }

  .click-prompt-label {
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-size: clamp(0.55rem, 0.8vw, 0.68rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mid);
  }

  /* Tap ripple icon — pure CSS */
  .tap-icon {
    width: 22px;
    height: 22px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tap-icon .finger {
    width: 7px;
    height: 7px;
    background: var(--mid);
    border-radius: 50%;
    position: relative;
    z-index: 2;
    animation: finger-pulse 2s ease-in-out infinite;
  }
  .tap-icon .ring {
    position: absolute;
    border: 1px solid var(--mid);
    border-radius: 50%;
    width: 7px;
    height: 7px;
    opacity: 0;
    animation: ring-expand 2s ease-out infinite;
  }
  .tap-icon .ring:nth-child(2) { animation-delay: 0s; }
  .tap-icon .ring:nth-child(3) { animation-delay: 0.4s; }

  @keyframes ring-expand {
    0%   { width: 7px;  height: 7px;  opacity: 0.6; }
    100% { width: 28px; height: 28px; opacity: 0;   }
  }
  @keyframes finger-pulse {
    0%, 100% { transform: scale(1);    opacity: 0.5; }
    50%       { transform: scale(1.15); opacity: 1;   }
  }

  /* ── FOOTER ── */
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: clamp(1.4rem, 3vw, 2rem) clamp(1.6rem, 3.5vw, 2.8rem);
    z-index: 10;
  }

  footer span, footer a {
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-size: clamp(0.58rem, 0.85vw, 0.72rem);
    letter-spacing: 0.06em;
    color: var(--mid);
    text-decoration: none;
    transition: color 0.25s ease;
  }
  footer a:hover { color: var(--fg); }

  .footer-centre {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: clamp(1.4rem, 3vw, 2rem);
  }

  /* ── CURSOR ── */
  #cursor {
    position: fixed;
    width: 6px;
    height: 6px;
    background: var(--fg);
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
  }

  /* ══════════════════════════════════════════
     CLICK VIDEO POPUP
  ══════════════════════════════════════════ */
  .video-popup {
    position: fixed;
    z-index: 50;
    pointer-events: none;

    /* Size — 4:3 and 1:1 share same display width */
    --vw: clamp(160px, 22vw, 300px);
    width: var(--vw);

    /* Anchor to click point via JS (top-left of element) */
    transform-origin: top left;

    /* Entry: scale up from 0 with a springy ease */
    animation: popup-in 0.55s cubic-bezier(0.34, 1.46, 0.64, 1) forwards;

    border: 1px solid rgba(255,255,255,0.09);
    overflow: hidden;
    background: #000;
  }

  /* Aspect ratio set per video via inline style */
  .video-popup video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Fade-out class added by JS when video ends */
  .video-popup.fading {
    animation: popup-out 0.5s cubic-bezier(0.4, 0, 1, 1) forwards;
  }

  @keyframes popup-in {
    from {
      opacity: 0;
      transform: scale(0.05);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  @keyframes popup-out {
    from {
      opacity: 1;
      transform: scale(1);
    }
    to {
      opacity: 0;
      transform: scale(0.08);
    }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="dot-canvas"></canvas>

<div class="stage">
  <div class="logo" id="logo">S<span style="letter-spacing:-0.07em">&amp;</span>S</div>
  <div class="subtitle-wrap" id="subtitle-wrap">
    <span class="subtitle" id="subtitle-a"></span>
    <span class="subtitle" id="subtitle-b"></span>
  </div>
</div>

<div class="click-prompt" id="click-prompt">
  <div class="tap-icon">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="finger"></div>
  </div>
  <span class="click-prompt-label">Click to see work</span>
</div>

<footer>
  <span class="footer-left">Design &amp; Technology</span>
  <span class="footer-centre">London</span>
  <a class="footer-right" href="mailto:hello@sands.studio">hello@sands.studio</a>
</footer>

<script>
(function () {

  /* ══════════════════════════════════════
     CURSOR
  ══════════════════════════════════════ */
  const cursorEl = document.getElementById('cursor');
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorEl.style.left = mx + 'px';
    cursorEl.style.top  = my + 'px';
  });


  /* ══════════════════════════════════════
     GRAVITY DOT FIELD
  ══════════════════════════════════════ */
  const dc   = document.getElementById('dot-canvas');
  const dctx = dc.getContext('2d');
  let W, H;

  function resizeDotCanvas() {
    W = dc.width  = window.innerWidth;
    H = dc.height = window.innerHeight;
  }
  resizeDotCanvas();
  window.addEventListener('resize', resizeDotCanvas);

  const COLS = 22, ROWS = 14;
  const dots = [];

  function initDots() {
    dots.length = 0;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const ox = (c + 0.5) / COLS * W;
        const oy = (r + 0.5) / ROWS * H;
        dots.push({ ox, oy, x: ox, y: oy, vx: 0, vy: 0 });
      }
    }
  }
  initDots();
  window.addEventListener('resize', initDots);

  let mouseActive = false;
  document.addEventListener('mousemove', () => { mouseActive = true; });

  function tickDots() {
    dctx.clearRect(0, 0, W, H);
    const pull = mouseActive ? 90 : 0;
    const maxD = 260;

    dots.forEach(d => {
      const dx = mx - d.x, dy = my - d.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxD && mouseActive) {
        const force = (1 - dist / maxD) * pull;
        d.vx += (dx / dist) * force * 0.016;
        d.vy += (dy / dist) * force * 0.016;
      }
      d.vx += (d.ox - d.x) * 0.055;
      d.vy += (d.oy - d.y) * 0.055;
      d.vx *= 0.78; d.vy *= 0.78;
      d.x += d.vx;  d.y += d.vy;

      const proximity = mouseActive ? Math.max(0, 1 - dist / maxD) : 0;
      const rr = 1.1 + proximity * 2.2;
      const alpha = 0.13 + proximity * 0.3;
      dctx.beginPath();
      dctx.arc(d.x, d.y, rr, 0, Math.PI * 2);
      dctx.fillStyle = 'rgba(200,200,200,' + alpha + ')';
      dctx.fill();
    });
    requestAnimationFrame(tickDots);
  }
  tickDots();


  /* ══════════════════════════════════════
     LOGO HOVER /* ══════════════════════════════════════
     MAGIC 8-BALL TEXT SEQUENCER
     — text rises from darkness with blur,
       holds, then dissolves back down.
       Two spans cross-fade so transitions
       feel continuous rather than blinking.
  ══════════════════════════════════════ */
  const elA = document.getElementById('subtitle-a');
  const elB = document.getElementById('subtitle-b');

  const phrases = [
    'Signal & Sense',
    'System & Soul',
    'Strategy & Substance',
    'Structure & Surprise',
    'Serious & Sexy',
    'Scale & Specificity',
  ];

  const HOLD     = 3000;  // how long phrase stays fully visible
  const FADE     = 900;   // CSS transition duration — must match CSS

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function loop() {
    let idx   = 0;
    let active = elA;   // the currently visible span
    let next   = elB;   // the incoming span

    // Prime: set first phrase on active, fade it in
    active.textContent = phrases[0];
    await sleep(50); // allow paint
    active.classList.add('visible');
    await sleep(HOLD);

    idx = 1;
    while (true) {
      const phrase = phrases[idx % phrases.length];

      // Load next phrase (invisible, blurred)
      next.textContent = phrase;
      next.classList.remove('visible', 'hidden');

      // Cross-fade: fade active out, fade next in simultaneously
      active.classList.remove('visible');
      active.classList.add('hidden');
      await sleep(60);  // slight stagger — next rises just after active sinks
      next.classList.add('visible');

      await sleep(FADE);

      // Clean up outgoing span
      active.classList.remove('hidden');
      active.textContent = '';

      // Swap roles
      [active, next] = [next, active];

      await sleep(HOLD);
      idx++;
    }
  }

  setTimeout(loop, 1200);


  /* ══════════════════════════════════════
     CLICK PROMPT — fade in after 2s,
     fade out after 8s
  ══════════════════════════════════════ */
  const prompt = document.getElementById('click-prompt');

  setTimeout(() => {
    prompt.classList.add('visible');
    setTimeout(() => {
      prompt.classList.remove('visible');
      prompt.classList.add('hidden');
    }, 6000); // visible for 6s (appears at 2s, gone at 8s)
  }, 2000);


  /* ══════════════════════════════════════
     CLICK VIDEO POPUP
  ══════════════════════════════════════ */
  const VIDEO_SRC = [
    { src: './videos/hunger-archive.mp4', aspect: 0.75 },
    { src: './videos/bbh-card-hover.mp4', aspect: 1.0 },
    { src: './videos/mm-3.mp4', aspect: 1.0 },
    { src: './videos/n6-cover.mp4', aspect: 1.0 },
    { src: './videos/hunger-cover.mp4', aspect: 1.0 },
    { src: './videos/n6-everything.mp4', aspect: 1.0 },
    { src: './videos/hunger-home.mp4', aspect: 0.75 }
  ];

  let videoIndex = 0;
  const BASE_W   = Math.min(300, Math.max(160, window.innerWidth * 0.22));

  document.addEventListener('click', e => {
    const vd = VIDEO_SRC[videoIndex % VIDEO_SRC.length];
    videoIndex++;

    const popup  = document.createElement('div');
    popup.className = 'video-popup';

    const h = Math.round(BASE_W * vd.aspect);
    popup.style.height = h + 'px';

    // Position: centre the popup on click point, clamped to viewport
    const pw = BASE_W, ph = h;
    let left = e.clientX - pw / 2;
    let top  = e.clientY - ph / 2;
    left = Math.max(8, Math.min(left, window.innerWidth  - pw - 8));
    top  = Math.max(8, Math.min(top,  window.innerHeight - ph - 8));

    popup.style.left = left + 'px';
    popup.style.top  = top  + 'px';

    // transform-origin: the actual click point relative to the popup
    const ox = ((e.clientX - left) / pw * 100).toFixed(1) + '%';
    const oy = ((e.clientY - top)  / ph * 100).toFixed(1) + '%';
    popup.style.transformOrigin = ox + ' ' + oy;

    const video  = document.createElement('video');
    video.src    = vd.src;
    video.muted  = true;
    video.playsInline = true;
    video.autoplay    = true;
    video.preload     = 'auto';

    popup.appendChild(video);
    document.body.appendChild(popup);
    video.play().catch(() => {});

    // Fade out when video ends
    video.addEventListener('ended', () => {
      popup.classList.add('fading');
      popup.addEventListener('animationend', () => popup.remove(), { once: true });
    });

    // Safety remove after 8s in case ended never fires
    setTimeout(() => {
      if (popup.parentNode) {
        popup.classList.add('fading');
        popup.addEventListener('animationend', () => popup.remove(), { once: true });
      }
    }, 8000);
  });

})();
</script>
</body>
</html>
